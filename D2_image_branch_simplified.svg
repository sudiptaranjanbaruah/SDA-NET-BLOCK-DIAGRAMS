<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 300" width="1480" height="300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <style>
      .box   { fill:#fffbeb; stroke:#d97706; stroke-width:1.6; rx:8; }
      .box-n { fill:#f8fafc; stroke:#64748b; stroke-width:1.6; rx:8; }
      .box-o { fill:#fef3c7; stroke:#b45309; stroke-width:2.2; rx:8; }
      .t     { font-size:15px; font-weight:700; fill:#0f172a; }
      .s     { font-size:12.5px; fill:#475569; }
      .sh    { font-size:12px; font-family:"Courier New",monospace; fill:#b45309; font-weight:700; }
      .lbl   { font-size:12px; font-family:"Courier New",monospace; fill:#b45309; }
      .flow  { stroke:#b45309; stroke-width:2; fill:none; marker-end:url(#ar); }
      .cap   { font-size:12.5px; fill:#64748b; font-style:italic; }
    </style>
  </defs>

  <!-- 1. Upload -->
  <rect class="box-n" x="20" y="70" width="180" height="110"/>
  <text class="t" x="110" y="106" text-anchor="middle">Photo</text>
  <text class="s" x="110" y="130" text-anchor="middle">uploaded by user</text>
  <text class="s" x="110" y="150" text-anchor="middle">JPEG / PNG</text>

  <path class="flow" d="M 200 125 H 250"/>

  <!-- 2. Preprocess -->
  <rect class="box" x="252" y="60" width="230" height="130"/>
  <text class="t" x="367" y="96" text-anchor="middle">Standardise</text>
  <text class="s" x="367" y="120" text-anchor="middle">resize · centre-crop 224px</text>
  <text class="s" x="367" y="140" text-anchor="middle">scale pixel values</text>
  <text class="sh" x="367" y="168" text-anchor="middle">[1, 3, 224, 224]</text>

  <path class="flow" d="M 482 125 H 532"/>

  <!-- 3. Backbone -->
  <rect class="box" x="534" y="50" width="250" height="150"/>
  <text class="t" x="659" y="86" text-anchor="middle">MobileNetV3</text>
  <text class="s" x="659" y="108" text-anchor="middle">pretrained backbone,</text>
  <text class="s" x="659" y="128" text-anchor="middle">fine-tuned on our data</text>
  <text class="s" x="659" y="152" text-anchor="middle">extracts visual features</text>
  <text class="sh" x="659" y="180" text-anchor="middle">[1, 960, 7, 7]</text>

  <path class="flow" d="M 784 125 H 834"/>

  <!-- 4. Head -->
  <rect class="box" x="836" y="60" width="220" height="130"/>
  <text class="t" x="946" y="96" text-anchor="middle">Classifier head</text>
  <text class="s" x="946" y="120" text-anchor="middle">pool → dropout → linear</text>
  <text class="s" x="946" y="140" text-anchor="middle">one score per disease</text>
  <text class="sh" x="946" y="168" text-anchor="middle">logits [1, 6]</text>

  <path class="flow" d="M 1056 125 H 1106"/>
  <text class="lbl" x="1081" y="115" text-anchor="middle">softmax</text>

  <!-- 5. Probabilities -->
  <rect class="box-o" x="1108" y="60" width="230" height="130"/>
  <text class="t" x="1223" y="96" text-anchor="middle">p_image ∈ ℝ⁶</text>
  <text class="s" x="1223" y="120" text-anchor="middle">probability per class,</text>
  <text class="s" x="1223" y="140" text-anchor="middle">reindexed to the shared</text>
  <text class="s" x="1223" y="160" text-anchor="middle">class order (1–6)</text>

  <path class="flow" d="M 1338 125 H 1400"/>

  <!-- 6. Fusion -->
  <rect class="box-n" x="1402" y="85" width="58" height="80"/>
  <text class="t" x="1431" y="118" text-anchor="middle" font-size="13">Late</text>
  <text class="t" x="1431" y="136" text-anchor="middle" font-size="13">fusion</text>

  <!-- single retained caveat -->
  <text class="cap" x="20" y="248">The image branch outputs one probability vector. Its only public interface is p_image, reindexed once into the canonical class order shared with the tabular branch.</text>
  <text class="cap" x="20" y="270">Preprocessing is deterministic (no augmentation at inference); the backbone runs in eval mode on CPU under no_grad.</text>
</svg>
