<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="2170" viewBox="0 0 1460 2170" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">

<defs>
  <style>
    .t   { font-size: 17px; font-weight: 700; fill: #0F172A; }
    .t2  { font-size: 15px; font-weight: 700; fill: #0F172A; }
    .b   { font-size: 12.5px; fill: #1E293B; }
    .m   { font-size: 12px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #334155; }
    .ms  { font-size: 11px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #475569; }
    .math{ font-size: 14px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #0F172A; }
    .el  { font-size: 12px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; font-weight: 500; }
    .co  { font-size: 11.5px; fill: #1E293B; }
    .cot { font-size: 12px; font-weight: 700; }
    .grp { font-size: 11px; font-weight: 700; fill: #64748B; letter-spacing: 1px; }
    .badge { font-size: 11.5px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; font-weight: 700; }
  </style>

  <marker id="a-amber"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#F59E0B"/></marker>
  <marker id="a-cyan"   markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#06B6D4"/></marker>
  <marker id="a-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#8B5CF6"/></marker>
  <marker id="a-slate"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#64748B"/></marker>
  <marker id="a-sm"     markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 z" fill="#8B5CF6"/></marker>
</defs>

<rect width="1460" height="2170" fill="#FFFFFF"/>

<!-- ══════════════ TITLE ══════════════ -->
<text x="400" y="46" font-size="23" font-weight="700" fill="#0F172A">D1 · The Complete System</text>
<text x="400" y="70" font-size="13.5" fill="#64748B">Photo → CNN → 6-way posterior → seeds the NB prior → adaptive EIG interview → evidence → SVM → fused with the image posterior → verdict</text>

<!-- ══════════════ LEGEND ══════════════ -->
<rect x="30" y="90" width="330" height="200" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
<text x="46" y="114" class="grp">COLOR = MEANING</text>
<rect x="48" y="126" width="15" height="15" rx="2" fill="#F59E0B" fill-opacity="0.25" stroke="#F59E0B"/><text x="74" y="138" class="b">IMAGE branch (from the photo)</text>
<rect x="48" y="152" width="15" height="15" rx="2" fill="#06B6D4" fill-opacity="0.25" stroke="#06B6D4"/><text x="74" y="164" class="b">TABULAR branch (34 features)</text>
<rect x="48" y="178" width="15" height="15" rx="2" fill="#8B5CF6" fill-opacity="0.25" stroke="#8B5CF6"/><text x="74" y="190" class="b">REASONING engine (NB + EIG)</text>
<rect x="48" y="204" width="15" height="15" rx="2" fill="#10B981" fill-opacity="0.25" stroke="#10B981"/><text x="74" y="216" class="b">LOCAL LLM (Ollama) — interface only</text>
<rect x="48" y="230" width="15" height="15" rx="2" fill="#64748B" fill-opacity="0.25" stroke="#64748B"/><text x="74" y="242" class="b">plumbing: I/O, adapters, remapping</text>
<rect x="48" y="256" width="15" height="15" rx="2" fill="#EF4444" fill-opacity="0.25" stroke="#EF4444"/><text x="74" y="268" class="b">honesty marker / [SIM] / failure path</text>

<!-- ══════════════ INPUT ══════════════ -->
<rect x="480" y="85" width="840" height="120" rx="8" fill="none" stroke="#94A3B8" stroke-width="1" stroke-dasharray="6 4"/>
<text x="494" y="104" class="grp">INPUT</text>

<rect x="520" y="112" width="280" height="70" rx="5" fill="#64748B" fill-opacity="0.12" stroke="#64748B" stroke-width="1.2"/>
<text x="660" y="140" class="t2" text-anchor="middle">Lesion photo</text>
<text x="660" y="163" class="ms" text-anchor="middle">JPEG / PNG · st.file_uploader</text>

<polygon points="1200,107 1290,147 1200,187 1110,147" fill="#64748B" fill-opacity="0.10" stroke="#64748B" stroke-width="1.2"/>
<text x="1200" y="152" class="b" text-anchor="middle" font-weight="600">Skip image?</text>

<!-- photo -> image branch -->
<line x1="660" y1="182" x2="660" y2="242" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#a-amber)"/>
<text x="674" y="220" class="el" fill="#B45309">PIL.Image</text>

<!-- ══════════════ IMAGE BRANCH ══════════════ -->
<rect x="400" y="250" width="520" height="130" rx="6" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="1.8"/>
<text x="420" y="280" class="t">IMAGE BRANCH — MobileNetV3-large-100</text>
<text x="420" y="304" class="m">timm mobilenetv3_large_100 · 224×224 · 960 → FC-6</text>
<text x="420" y="326" class="m">conv_head / act2 → Identity          (internals: see D2)</text>
<text x="420" y="358" class="badge" fill="#B45309">measured: acc 0.733 · macro-F1 0.716 · AUC 0.920</text>

<!-- image -> labels -->
<line x1="660" y1="380" x2="660" y2="447" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#a-amber)"/>
<text x="674" y="420" class="el" fill="#B45309">softmax ∈ ℝ⁶ (alphabetical order)</text>

<!-- ══════════════ LABELS / REINDEX ══════════════ -->
<rect x="400" y="455" width="520" height="90" rx="6" fill="#64748B" fill-opacity="0.12" stroke="#64748B" stroke-width="1.5"/>
<text x="420" y="483" class="t2">labels.py — REINDEX to canonical order</text>
<text x="420" y="506" class="m">alphabetical CNN order → tabular class ids [1..6]</text>
<text x="420" y="528" class="ms">0→1 · 1→4 · 2→6 · 3→5 · 4→3 · 5→2   (applied exactly once)</text>

<!-- labels -> fan-out -->
<line x1="660" y1="545" x2="660" y2="586" stroke="#F59E0B" stroke-width="1.8"/>
<circle cx="660" cy="600" r="12" fill="#F59E0B" stroke="#B45309" stroke-width="1.5"/>

<!-- (a) fan-out -> engine -->
<line x1="660" y1="612" x2="660" y2="672" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#a-amber)"/>
<text x="676" y="652" class="el" fill="#B45309">(a) seeds the PRIOR</text>

<!-- (b) fan-out -> fusion : the bypass lane, with a hop where it crosses the skip line -->
<path d="M672,600 L1188,600 A12,12 0 0 1 1212,600 L1390,600 L1390,1660 L930,1660"
      fill="none" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#a-amber)"/>
<text x="700" y="589" class="el" fill="#B45309">(b) held for FUSION</text>
<g transform="translate(1378,1150) rotate(-90)"><text x="0" y="0" class="el" fill="#B45309" text-anchor="middle">p_image ∈ ℝ⁶  (canonical)</text></g>

<!-- ══════════════ SKIP PATH ══════════════ -->
<line x1="1200" y1="187" x2="1200" y2="732" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#a-slate)"/>
<text x="1214" y="320" class="ms">(no photo)</text>
<rect x="1090" y="740" width="220" height="70" rx="5" fill="#64748B" fill-opacity="0.12" stroke="#64748B" stroke-width="1.2"/>
<text x="1200" y="768" class="t2" text-anchor="middle">uniform prior</text>
<text x="1200" y="791" class="ms" text-anchor="middle">1/6 each — interview only</text>
<line x1="1090" y1="775" x2="930" y2="775" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#a-slate)"/>

<!-- ══════════════ NAIVE BAYES ENGINE ══════════════ -->
<rect x="400" y="680" width="520" height="140" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="420" y="709" class="t">REASONING ENGINE — NaiveBayesEngine</text>
<text x="420" y="738" class="math">P(d | e)  ∝  P(d) · ∏_f P(v_f | d)</text>
<text x="420" y="762" class="m">prior ← p_image     (else uniform 1/6)</text>
<text x="420" y="786" class="b">ranks every unanswered feature by expected information gain:</text>
<text x="420" y="809" class="math">EIG(f) = H(d) − E_v[ H(d | f = v) ]   ≥ 0</text>

<!-- engine -> session -->
<line x1="660" y1="820" x2="660" y2="892" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#a-violet)"/>
<text x="674" y="862" class="el" fill="#6D28D9">EIG ranking over unanswered features</text>

<!-- ══════════════ SESSION LOOP ══════════════ -->
<rect x="400" y="900" width="520" height="380" rx="6" fill="#8B5CF6" fill-opacity="0.09" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="420" y="927" class="t">DiagnosticSession — THE LOOP</text>
<text x="420" y="947" class="ms" fill="#059669">green = the only LLM steps (see D5) — the engine owns the question policy</text>

<rect x="430" y="958" width="460" height="315" rx="5" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1"/>

<rect x="445" y="970" width="430" height="38" rx="4" fill="#8B5CF6" fill-opacity="0.14" stroke="#8B5CF6" stroke-width="1"/>
<text x="460" y="994" class="b">1 · pick argmax EIG  →  the next feature to ask</text>
<line x1="660" y1="1008" x2="660" y2="1016" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#a-sm)"/>

<rect x="445" y="1020" width="430" height="38" rx="4" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-width="1"/>
<text x="460" y="1044" class="b">2 · LLM phrases it — llm.phrase_question(f)</text>
<line x1="660" y1="1058" x2="660" y2="1066" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#a-sm)"/>

<rect x="445" y="1070" width="430" height="38" rx="4" fill="#64748B" fill-opacity="0.12" stroke="#64748B" stroke-width="1"/>
<text x="460" y="1094" class="b">3 · patient answers in plain English</text>
<line x1="660" y1="1108" x2="660" y2="1116" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#a-sm)"/>

<rect x="445" y="1120" width="430" height="38" rx="4" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-width="1"/>
<text x="460" y="1144" class="b">4 · LLM parses → 0–3 / 0–1 / age  (JSON-schema constrained)</text>
<line x1="660" y1="1158" x2="660" y2="1166" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#a-sm)"/>

<rect x="445" y="1170" width="430" height="38" rx="4" fill="#8B5CF6" fill-opacity="0.14" stroke="#8B5CF6" stroke-width="1"/>
<text x="460" y="1194" class="b">5 · engine.observe(f, v)  →  posterior updates</text>
<line x1="660" y1="1208" x2="660" y2="1216" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#a-sm)"/>

<rect x="445" y="1220" width="430" height="38" rx="4" fill="#EF4444" fill-opacity="0.10" stroke="#EF4444" stroke-width="1"/>
<text x="460" y="1244" class="b">6 · stop?   conf ≥ 0.90  ∨  15 q  ∨  EIG &lt; 1e-3</text>

<!-- loop-back -->
<path d="M875,1239 L884,1239 L884,989 L877,989" fill="none" stroke="#8B5CF6" stroke-width="1.2" marker-end="url(#a-sm)"/>

<!-- session -> tabular -->
<line x1="660" y1="1280" x2="660" y2="1372" stroke="#06B6D4" stroke-width="1.8" marker-end="url(#a-cyan)"/>
<text x="674" y="1312" class="el" fill="#0E7490">evidence = {feature: value, …}</text>
<text x="674" y="1332" class="ms" fill="#0E7490">median 3 answers · mean 4.2 · out of 34</text>

<!-- ══════════════ TABULAR BRANCH ══════════════ -->
<rect x="400" y="1380" width="520" height="130" rx="6" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-width="1.8"/>
<text x="420" y="1409" class="t">TABULAR BRANCH — RBF-SVM</text>
<text x="420" y="1434" class="m">SimpleImputer(median) → StandardScaler → SVC(rbf, probability=True)</text>
<text x="420" y="1458" class="b">unasked features → median-imputed        (internals: see D3)</text>
<text x="420" y="1488" class="badge" fill="#0E7490">5-fold CV: acc 0.973 · macro-F1 0.971</text>

<!-- tabular -> fusion -->
<line x1="660" y1="1510" x2="660" y2="1572" stroke="#06B6D4" stroke-width="1.8" marker-end="url(#a-cyan)"/>
<text x="674" y="1548" class="el" fill="#0E7490">p_tabular ∈ ℝ⁶</text>

<!-- ══════════════ LATE FUSION ══════════════ -->
<rect x="400" y="1580" width="520" height="160" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="420" y="1610" class="t">LATE FUSION — combine.fuse()</text>
<rect x="792" y="1592" width="112" height="22" rx="11" fill="#EF4444" fill-opacity="0.14" stroke="#EF4444" stroke-width="1"/>
<text x="848" y="1607" class="badge" fill="#B91C1C" text-anchor="middle">[SIM] weights</text>
<text x="420" y="1637" class="b">log opinion pool (product of experts)</text>
<text x="420" y="1666" class="math">log p_fused ∝ 0.35·log p_image + 0.65·log p_tabular</text>
<text x="420" y="1691" class="m">T = 1.0 · then normalize</text>
<text x="420" y="1717" class="ms" fill="#B91C1C">weights chosen on a SIMULATED paired set — see D4</text>

<!-- fusion -> output -->
<line x1="660" y1="1740" x2="660" y2="1802" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#a-violet)"/>
<text x="674" y="1778" class="el" fill="#6D28D9">p_fused ∈ ℝ⁶</text>

<!-- ══════════════ OUTPUT ══════════════ -->
<rect x="400" y="1810" width="520" height="190" rx="6" fill="#64748B" fill-opacity="0.12" stroke="#64748B" stroke-width="1.8"/>
<text x="420" y="1840" class="t">OUTPUT</text>
<text x="420" y="1870" class="b">· top-1 verdict + probability</text>
<text x="420" y="1894" class="b">· top-3 differential</text>
<text x="420" y="1918" class="b">· conformal set @ 90% coverage  (singleton = confident, triple = escalate)</text>
<text x="420" y="1942" class="b">· agreement / JSD conflict flag between the two branches</text>
<text x="420" y="1966" class="b">· full question trajectory (audit log)</text>

<!-- ══════════════ CALLOUT 1 — the fan-out (RED, the point of the figure) ══════════════ -->
<rect x="30" y="555" width="330" height="185" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="5 3"/>
<text x="46" y="578" class="cot" fill="#B91C1C">THE IMAGE POSTERIOR IS USED TWICE</text>
<text x="46" y="602" class="co">(a) it seeds the reasoning engine's prior — so</text>
<text x="46" y="619" class="co">the interview asks the questions that best</text>
<text x="46" y="636" class="co">discriminate the photo's top-3 candidates.</text>
<text x="46" y="660" class="co">(b) it enters the final late fusion, as a second</text>
<text x="46" y="677" class="co">opinion on the verdict.</text>
<text x="46" y="704" class="co" font-weight="600">This is the core design decision of the system,</text>
<text x="46" y="721" class="co" font-weight="600">not an implementation detail.</text>
<line x1="360" y1="620" x2="646" y2="600" stroke="#EF4444" stroke-width="1" stroke-dasharray="4 3"/>

<!-- ══════════════ CALLOUT 2 — the loop ══════════════ -->
<rect x="30" y="960" width="330" height="165" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 3"/>
<text x="46" y="983" class="cot" fill="#334155">MEDIAN 3 QUESTIONS</text>
<text x="46" y="1007" class="co">The engine reaches a confident diagnosis after a</text>
<text x="46" y="1024" class="co">median of 3 questions (mean 4.2) out of the 34</text>
<text x="46" y="1041" class="co">available — matching the full-form ceiling:</text>
<text x="46" y="1065" class="co" font-weight="600">adaptive 0.973 acc / 0.969 macro-F1</text>
<text x="46" y="1090" class="co">Random question order needs a median of 8</text>
<text x="46" y="1107" class="co">questions to reach only 0.915.</text>
<line x1="360" y1="1035" x2="392" y2="1060" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3"/>

<!-- ══════════════ CALLOUT 3 — imputation ══════════════ -->
<rect x="30" y="1380" width="330" height="130" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 3"/>
<text x="46" y="1403" class="cot" fill="#334155">THE SVM ALWAYS SEES 34 FEATURES</text>
<text x="46" y="1427" class="co">The pipeline median-imputes every feature the</text>
<text x="46" y="1444" class="co">interview never asked about. The SVM therefore</text>
<text x="46" y="1461" class="co">always receives a full 34-vector — we simply</text>
<text x="46" y="1478" class="co">never force the patient to fill it in.</text>
<text x="46" y="1499" class="co" font-weight="600">(Naive Bayes needs no imputation at all — D3.)</text>
<line x1="360" y1="1445" x2="392" y2="1445" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 3"/>

<!-- ══════════════ CALLOUT 4 — the honesty box ══════════════ -->
<rect x="30" y="2030" width="1000" height="115" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.4" stroke-dasharray="6 4"/>
<text x="48" y="2055" class="cot" fill="#B91C1C">WHY LATE FUSION — the constraint that defines this project</text>
<text x="48" y="2079" class="co">The 3,592 photos and the 366 UCI patients are <tspan font-weight="700">disjoint patient populations</tspan>. No patient has both a photo and clinical features.</text>
<text x="48" y="2098" class="co">A jointly-trained multimodal network is therefore impossible here — the only legal meeting point of the two models is the <tspan font-weight="700">probability simplex</tspan>.</text>
<text x="48" y="2117" class="co">Fusion is decision-level by necessity, not by preference. The 0.35 / 0.65 weights were chosen on a <tspan font-weight="700" fill="#B91C1C">SIMULATED</tspan> paired set — see D4.</text>

</svg>
