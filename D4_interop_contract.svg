<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1460" viewBox="0 0 1800 1460" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">

<defs>
  <style>
    text { white-space: pre; }
    .t   { font-size: 17px; font-weight: 700; fill: #0F172A; }
    .t2  { font-size: 15px; font-weight: 700; fill: #0F172A; }
    .b   { font-size: 12.5px; fill: #1E293B; }
    .m   { font-size: 12px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #334155; }
    .ms  { font-size: 11px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #475569; }
    .mb  { font-size: 13px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; font-weight: 700; fill: #0F172A; }
    .math{ font-size: 14px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #0F172A; }
    .co  { font-size: 11.5px; fill: #1E293B; }
    .cot { font-size: 12px; font-weight: 700; }
    .grp { font-size: 12px; font-weight: 700; fill: #64748B; letter-spacing: 1.5px; }
    .badge { font-size: 11.5px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; font-weight: 700; }
  </style>
  <marker id="a-amber"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#F59E0B"/></marker>
  <marker id="a-cyan"   markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#06B6D4"/></marker>
  <marker id="a-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#8B5CF6"/></marker>
  <marker id="a-slate"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#64748B"/></marker>
  <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#EF4444" stroke-width="3" stroke-opacity="0.25"/>
  </pattern>
</defs>

<rect width="1800" height="1460" fill="#FFFFFF"/>

<text x="40" y="46" font-size="23" font-weight="700" fill="#0F172A">D4 · How the Two Models Communicate — the interop contract</text>
<text x="40" y="70" font-size="13.5" fill="#64748B">Two models trained on disjoint patient populations, made to talk to each other. This figure is the intellectual core of the project — and the honest part.</text>

<!-- ═══════════════ REGISTER 1 — THE WALL ═══════════════ -->
<text x="40" y="106" class="grp" fill="#B91C1C">1 · THE WALL</text>

<rect x="40" y="120" width="440" height="180" rx="6" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="1.8"/>
<text x="62" y="152" class="t">IMAGE POPULATION</text>
<text x="62" y="178" class="m">3,592 dermatology photos</text>
<text x="62" y="200" class="m">Kaggle · 6 classes · 36:1</text>
<text x="62" y="228" class="b">Has: a lesion photograph.</text>
<text x="62" y="250" class="b">Has NOT: any clinical feature,</text>
<text x="62" y="268" class="b">any biopsy, any age.</text>
<text x="62" y="290" class="ms" fill="#B45309">→ trained MobileNetV3</text>

<rect x="1320" y="120" width="440" height="180" rx="6" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-width="1.8"/>
<text x="1342" y="152" class="t">TABULAR POPULATION</text>
<text x="1342" y="178" class="m">366 UCI patients</text>
<text x="1342" y="200" class="m">34 features · 6 classes · 5.6:1</text>
<text x="1342" y="228" class="b">Has: 34 clinical + histopath</text>
<text x="1342" y="246" class="b">features, biopsy-confirmed.</text>
<text x="1342" y="268" class="b">Has NOT: a single photograph.</text>
<text x="1342" y="290" class="ms" fill="#0E7490">→ trained RBF-SVM</text>

<!-- the impossible joint network -->
<rect x="620" y="140" width="560" height="120" rx="6" fill="url(#hatch)" stroke="#EF4444" stroke-width="1.6" stroke-dasharray="7 4"/>
<rect x="620" y="140" width="560" height="120" rx="6" fill="#FEF2F2" fill-opacity="0.55" stroke="none"/>
<text x="900" y="180" class="t" fill="#94A3B8" text-anchor="middle">JOINT MULTIMODAL NETWORK</text>
<text x="900" y="204" class="b" fill="#94A3B8" text-anchor="middle">shared encoder · cross-attention · end-to-end training</text>
<line x1="640" y1="150" x2="1160" y2="250" stroke="#EF4444" stroke-width="2.5" stroke-opacity="0.55"/>
<line x1="1160" y1="150" x2="640" y2="250" stroke="#EF4444" stroke-width="2.5" stroke-opacity="0.55"/>
<rect x="648" y="218" width="504" height="26" rx="4" fill="#FFFFFF" fill-opacity="0.92"/>
<text x="900" y="236" class="cot" fill="#B91C1C" text-anchor="middle">IMPOSSIBLE HERE — there are no paired examples to train it on</text>

<!-- struck arrows -->
<line x1="480" y1="200" x2="612" y2="200" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="5 3"/>
<line x1="536" y1="186" x2="560" y2="214" stroke="#EF4444" stroke-width="2.5"/>
<line x1="560" y1="186" x2="536" y2="214" stroke="#EF4444" stroke-width="2.5"/>

<line x1="1320" y1="200" x2="1188" y2="200" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="5 3"/>
<line x1="1240" y1="186" x2="1264" y2="214" stroke="#EF4444" stroke-width="2.5"/>
<line x1="1264" y1="186" x2="1240" y2="214" stroke="#EF4444" stroke-width="2.5"/>

<text x="900" y="292" class="b" font-size="13.5" text-anchor="middle" font-weight="700" fill="#B91C1C">No patient appears in both datasets. The only legal meeting point of the two models is the probability simplex.</text>

<!-- ═══════════════ REGISTER 2 — LABEL ALIGNMENT ═══════════════ -->
<line x1="40" y1="330" x2="1760" y2="330" stroke="#E2E8F0" stroke-width="1"/>
<text x="40" y="362" class="grp" fill="#334155">2 · LABEL-SPACE ALIGNMENT — the precondition for any communication at all</text>

<text x="570" y="400" class="mb" text-anchor="middle" fill="#B45309">CNN softmax index</text>
<text x="1230" y="400" class="mb" text-anchor="middle" fill="#0E7490">canonical class id</text>
<text x="900" y="392" class="ms" text-anchor="middle">labels.image_probs_to_canonical()</text>
<text x="900" y="410" class="ms" text-anchor="middle" fill="#94A3B8">applied exactly ONCE, at the adapter boundary</text>

<g stroke="#F59E0B" stroke-width="1.6" fill="none">
  <path d="M760,432 L1040,432"/>
  <path d="M760,462 L1040,522"/>
  <path d="M760,492 L1040,582"/>
  <path d="M760,522 L1040,552"/>
  <path d="M760,552 L1040,492"/>
  <path d="M760,582 L1040,462"/>
</g>

<rect x="380" y="420" width="380" height="24" rx="4" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-width="1"/><text x="396" y="437" class="m">0   "PSORIASIS"</text>
<rect x="380" y="450" width="380" height="24" rx="4" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-width="1"/><text x="396" y="467" class="m">1   "Rosea"</text>
<rect x="380" y="480" width="380" height="24" rx="4" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-width="1"/><text x="396" y="497" class="m">2   "Rubra"</text>
<rect x="380" y="510" width="380" height="24" rx="4" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-width="1"/><text x="396" y="527" class="m">3   "chronic dermatitis"</text>
<rect x="380" y="540" width="380" height="24" rx="4" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-width="1"/><text x="396" y="557" class="m">4   "lichen planus"</text>
<rect x="380" y="570" width="380" height="24" rx="4" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-width="1"/><text x="396" y="587" class="m">5   "seborrheic dermatitis"</text>

<rect x="1040" y="420" width="380" height="24" rx="4" fill="#06B6D4" fill-opacity="0.14" stroke="#06B6D4" stroke-width="1"/><text x="1056" y="437" class="m">1   Psoriasis</text>
<rect x="1040" y="450" width="380" height="24" rx="4" fill="#06B6D4" fill-opacity="0.14" stroke="#06B6D4" stroke-width="1"/><text x="1056" y="467" class="m">2   Seborrheic Dermatitis</text>
<rect x="1040" y="480" width="380" height="24" rx="4" fill="#06B6D4" fill-opacity="0.14" stroke="#06B6D4" stroke-width="1"/><text x="1056" y="497" class="m">3   Lichen Planus</text>
<rect x="1040" y="510" width="380" height="24" rx="4" fill="#06B6D4" fill-opacity="0.14" stroke="#06B6D4" stroke-width="1"/><text x="1056" y="527" class="m">4   Pityriasis Rosea</text>
<rect x="1040" y="540" width="380" height="24" rx="4" fill="#06B6D4" fill-opacity="0.14" stroke="#06B6D4" stroke-width="1"/><text x="1056" y="557" class="m">5   Chronic Dermatitis</text>
<rect x="1040" y="570" width="380" height="24" rx="4" fill="#06B6D4" fill-opacity="0.14" stroke="#06B6D4" stroke-width="1"/><text x="1056" y="587" class="m">6   Pityriasis Rubra Pilaris</text>

<rect x="40" y="420" width="310" height="174" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="5 3"/>
<text x="56" y="444" class="cot" fill="#B91C1C">A SILENT FAILURE MODE</text>
<text x="56" y="468" class="co">Get this permutation wrong and every</text>
<text x="56" y="485" class="co">downstream number is wrong — but</text>
<text x="56" y="502" class="co">nothing crashes and nothing warns.</text>
<text x="56" y="519" class="co">The system just quietly gets worse.</text>
<text x="56" y="546" class="co" font-weight="600">The two models index the same six</text>
<text x="56" y="563" class="co" font-weight="600">diseases in different orders. That is</text>
<text x="56" y="580" class="co" font-weight="600">the whole problem.</text>

<rect x="1450" y="420" width="310" height="174" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="5 3"/>
<text x="1466" y="444" class="cot" fill="#334155">CONFIRMED, 3 WAYS</text>
<text x="1466" y="468" class="co">1 · ImageFolder's sorted() order on</text>
<text x="1478" y="485" class="co">the real dataset directory</text>
<text x="1466" y="506" class="co">2 · the training notebook's</text>
<text x="1478" y="523" class="ms">sorted(os.listdir(DATA_DIR))</text>
<text x="1466" y="544" class="co">3 · the per-class metrics CSV row</text>
<text x="1478" y="561" class="co">order</text>
<text x="1466" y="584" class="ms" fill="#94A3B8">all three agree · labels.py</text>

<!-- ═══════════════ REGISTER 3 — THE TWO CHANNELS ═══════════════ -->
<line x1="40" y1="625" x2="1760" y2="625" stroke="#E2E8F0" stroke-width="1"/>
<text x="40" y="657" class="grp" fill="#334155">3 · THE TWO CHANNELS — how the photo actually reaches the verdict</text>

<rect x="740" y="680" width="320" height="52" rx="16" fill="#F59E0B" fill-opacity="0.20" stroke="#F59E0B" stroke-width="2.2"/>
<text x="900" y="712" class="mb" text-anchor="middle">p_image ∈ ℝ⁶  (canonical)</text>

<path d="M820,732 L820,760 L520,760 L520,792" fill="none" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#a-amber)"/>
<path d="M980,732 L980,760 L1300,760 L1300,792" fill="none" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#a-amber)"/>
<text x="512" y="778" class="el" fill="#B45309" text-anchor="end">CHANNEL 1 · soft, indirect</text>
<text x="1310" y="778" class="el" fill="#B45309">CHANNEL 2 · hard, direct</text>

<!-- channel 1 -->
<rect x="180" y="800" width="680" height="170" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="200" y="830" class="t">PRIOR SEEDING</text>
<text x="200" y="854" class="m">engine.set_image_prior(p_image)</text>
<text x="200" y="884" class="b">The photo does not vote on the diagnosis here.</text>
<text x="200" y="906" class="b">It re-ranks the <tspan font-weight="700">questions</tspan>: seeding the prior with the photo's</text>
<text x="200" y="924" class="b">top-3 makes EIG pick features that discriminate <tspan font-style="italic">those</tspan> candidates.</text>
<text x="200" y="954" class="badge" fill="#6D28D9">effect: median 3 questions → 2</text>

<!-- channel 2 -->
<rect x="960" y="800" width="680" height="170" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="980" y="830" class="t">LATE FUSION</text>
<text x="980" y="854" class="m">combine.fuse(p_image, p_tabular)</text>
<text x="980" y="886" class="math">log p_fused ∝ 0.35·log p_image + 0.65·log p_tabular</text>
<text x="980" y="912" class="b">log opinion pool = product of experts, then normalize · T = 1.0</text>
<text x="980" y="936" class="ms">also implemented: linear pool (weighted arithmetic mean) — log wins at the optimum</text>
<text x="980" y="960" class="ms" fill="#B91C1C">the 0.35 / 0.65 weights come from the simulation below ↓</text>

<!-- evidence -> tabular -->
<rect x="240" y="1000" width="560" height="86" rx="6" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-width="1.8"/>
<text x="260" y="1028" class="t2">the interview collects evidence → the SVM scores it</text>
<text x="260" y="1052" class="m">tabular_from_evidence(e) → SVM → p_tabular ∈ ℝ⁶</text>
<text x="260" y="1074" class="ms">unasked features median-imputed (D3)</text>
<line x1="520" y1="970" x2="520" y2="992" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#a-violet)"/>

<path d="M800,1043 L890,1043 L890,885 L952,885" fill="none" stroke="#06B6D4" stroke-width="1.8" marker-end="url(#a-cyan)"/>
<g transform="translate(878,975) rotate(-90)"><text x="0" y="0" class="ms" fill="#0E7490" text-anchor="middle">p_tabular</text></g>

<!-- agreement -->
<rect x="960" y="1000" width="680" height="86" rx="6" fill="#64748B" fill-opacity="0.12" stroke="#64748B" stroke-width="1.6"/>
<text x="980" y="1028" class="t2">AGREEMENT DIAGNOSTICS — combine.agreement()</text>
<text x="980" y="1052" class="b">· concordant? (do the two argmaxes match)   · image_top1 vs tabular_top1</text>
<text x="980" y="1074" class="b">· JSD ∈ [0,1] conflict score → a high JSD flags the case for human review</text>
<line x1="1300" y1="970" x2="1300" y2="992" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#a-violet)"/>

<rect x="1660" y="800" width="100" height="286" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="5 3"/>
<g transform="translate(1710,943) rotate(-90)">
  <text x="0" y="-6" class="cot" fill="#B91C1C" text-anchor="middle">NOT FULLY INDEPENDENT</text>
  <text x="0" y="12" class="co" text-anchor="middle">p_image shapes which questions are asked,</text>
  <text x="0" y="28" class="co" text-anchor="middle">so p_tabular is not independent of it. We name this.</text>
</g>

<!-- ═══════════════ REGISTER 4 — THE WEIGHTS [SIM] ═══════════════ -->
<rect x="40" y="1120" width="1720" height="310" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="7 4"/>
<text x="64" y="1152" class="grp" fill="#B91C1C">4 · WHERE THE WEIGHTS CAME FROM — [SIM] SIMULATED, NOT MEASURED</text>
<text x="64" y="1176" class="b">You cannot tune fusion weights on data you do not have. So <tspan font-weight="700">fusion/weight_sweep.py</tspan> builds a simulated paired set:</text>

<rect x="80" y="1194" width="420" height="86" rx="6" fill="#06B6D4" fill-opacity="0.12" stroke="#06B6D4" stroke-width="1.6"/>
<text x="98" y="1220" class="t2" font-size="13">REAL out-of-fold SVM posteriors</text>
<text x="98" y="1243" class="ms">5-fold CV over the 366 UCI rows —</text>
<text x="98" y="1261" class="ms">mirrors the app's own pipeline exactly</text>

<text x="527" y="1246" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">×</text>

<rect x="555" y="1194" width="420" height="86" rx="6" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-width="1.6"/>
<text x="573" y="1220" class="t2" font-size="13">SIMULATED image posteriors</text>
<text x="573" y="1243" class="ms">73% accurate · 0.70 peak mass —</text>
<text x="573" y="1261" class="ms">calibrated to the MEASURED image branch</text>

<path d="M975,1237 L1010,1237" fill="none" stroke="#64748B" stroke-width="1.8" marker-end="url(#a-slate)"/>

<rect x="1020" y="1180" width="700" height="114" rx="6" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.6"/>
<text x="1040" y="1206" class="t2">25 seeded draws, averaged → sweep the grid</text>
<text x="1040" y="1230" class="m">w_image ∈ [0,1] × {log, linear} × temperature</text>
<text x="1040" y="1258" class="mb" fill="#B91C1C">OPTIMUM: log · w_image 0.35 / w_tabular 0.65 · T = 1.0</text>
<text x="1040" y="1282" class="m" fill="#B91C1C">fused 0.988 [SIM]  vs  0.973 tabular-only</text>

<text x="64" y="1320" class="b" font-weight="700" fill="#B91C1C">An INTERIOR optimum — past w_image ≈ 0.55, fusion is WORSE than tabular-only. The weaker branch must be down-weighted, not averaged in.</text>
<text x="64" y="1352" class="b">The sentence that must survive Q&amp;A: <tspan font-weight="700">0.988 is a simulated number.</tspan> We have never measured fusion on a real patient with both a photo and a biopsy, because no such patient exists in our data.</text>
<text x="64" y="1378" class="b">What the simulation legitimately buys us is <tspan font-weight="700">the weight</tspan> — a principled 0.35 / 0.65 instead of an arbitrary 0.5 / 0.5 — and the finding that the optimal image weight scales with image accuracy</text>
<text x="64" y="1404" class="b">(the competence curve). Those two results are about the <tspan font-style="italic">method</tspan>, and they survive the fact that the accuracy number itself is synthetic.</text>

</svg>
