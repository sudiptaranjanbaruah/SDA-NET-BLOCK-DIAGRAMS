<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1380" viewBox="0 0 1800 1380" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">

<defs>
  <style>
    text { white-space: pre; }
    .t   { font-size: 17px; font-weight: 700; fill: #0F172A; }
    .t2  { font-size: 15px; font-weight: 700; fill: #0F172A; }
    .b   { font-size: 12.5px; fill: #1E293B; }
    .m   { font-size: 12px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #334155; }
    .ms  { font-size: 11px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; fill: #475569; }
    .mb  { font-size: 13px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; font-weight: 700; fill: #0F172A; }
    .co  { font-size: 11.5px; fill: #1E293B; }
    .cot { font-size: 12px; font-weight: 700; }
    .grp { font-size: 12px; font-weight: 700; fill: #64748B; letter-spacing: 1.5px; }
    .badge { font-size: 11.5px; font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace; font-weight: 700; }
  </style>
  <marker id="a-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#8B5CF6"/></marker>
  <marker id="a-green"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#10B981"/></marker>
  <marker id="a-slate"  markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 z" fill="#64748B"/></marker>
</defs>

<rect width="1800" height="1380" fill="#FFFFFF"/>

<text x="40" y="46" font-size="23" font-weight="700" fill="#0F172A">D5 · The Role of Ollama — a language shell around a Bayesian core</text>
<text x="40" y="70" font-size="13.5" fill="#64748B">The LLM renders a feature name into English, and English back into a number. That is all it does. This figure exists to prove it.</text>

<!-- ═══════════ TRUST BOUNDARY ═══════════ -->
<line x1="648" y1="115" x2="648" y2="1215" stroke="#334155" stroke-width="2" stroke-dasharray="9 5"/>
<g transform="translate(632,660) rotate(-90)"><text x="0" y="0" class="grp" fill="#334155" text-anchor="middle">TRUST BOUNDARY</text></g>

<text x="60" y="106" class="grp" fill="#6D28D9">BAYESIAN CORE — deterministic · auditable · does the diagnosis</text>
<text x="708" y="106" class="grp" fill="#059669">LANGUAGE SHELL — stochastic · swappable · OPTIONAL · diagnoses nothing</text>
<text x="1448" y="106" class="grp" fill="#334155">HUMAN</text>

<!-- ═══════════ LEFT — THE CORE ═══════════ -->
<rect x="60" y="130" width="540" height="150" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="80" y="160" class="t">NaiveBayesEngine</text>
<text x="80" y="186" class="b">holds the posterior over the 6 diseases</text>
<text x="80" y="210" class="b">ranks every unanswered feature by EIG</text>
<text x="80" y="238" class="mb" fill="#6D28D9">argmax EIG → feature = "itching"</text>
<text x="80" y="264" class="ms">the LLM is not consulted, and is not told the result</text>

<rect x="60" y="310" width="540" height="170" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="80" y="340" class="t">DiagnosticSession</text>
<text x="80" y="366" class="b">· owns the question <tspan font-weight="700">policy</tspan> — which feature is asked next</text>
<text x="80" y="390" class="b">· owns the stopping rule — conf ≥ 0.90 ∨ 15 q ∨ EIG &lt; 1e-3</text>
<text x="80" y="414" class="b">· owns the evidence dict and the audit trajectory</text>
<text x="80" y="444" class="co" font-weight="700" fill="#6D28D9">Every decision that affects the diagnosis is made on this side</text>
<text x="80" y="462" class="co" font-weight="700" fill="#6D28D9">of the boundary, by code with no learned parameters in it.</text>

<rect x="60" y="520" width="540" height="230" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.4" stroke-dasharray="5 3"/>
<text x="80" y="550" class="cot" fill="#B91C1C">WHAT THE LLM NEVER SEES</text>
<text x="80" y="580" class="b">✕  the posterior over diseases</text>
<text x="80" y="606" class="b">✕  the candidate diagnoses (not even the top-3)</text>
<text x="80" y="632" class="b">✕  the answers given so far</text>
<text x="80" y="658" class="b">✕  the information-gain ranking</text>
<text x="80" y="684" class="b">✕  the stopping rule, the verdict, the conformal set</text>
<text x="80" y="720" class="co">It is handed one feature name, and later one sentence of English.</text>
<text x="80" y="738" class="co">It is told nothing else, because it needs nothing else.</text>

<rect x="60" y="1040" width="540" height="140" rx="6" fill="#8B5CF6" fill-opacity="0.12" stroke="#8B5CF6" stroke-width="1.8"/>
<text x="80" y="1070" class="t">engine.observe("itching", 3)</text>
<text x="80" y="1098" class="b">the posterior updates · the next EIG ranking is computed</text>
<text x="80" y="1122" class="b">the loop continues, or the stopping rule fires</text>
<text x="80" y="1152" class="ms" fill="#6D28D9">deterministic · reproducible · fully auditable from the trajectory</text>

<!-- ═══════════ GATE MARKERS ON THE BOUNDARY ═══════════ -->
<circle cx="648" cy="205" r="9" fill="#EF4444"/>
<text x="648" y="236" class="cot" fill="#B91C1C" text-anchor="middle">GATE 1</text>
<circle cx="648" cy="1110" r="9" fill="#EF4444"/>
<text x="648" y="1086" class="cot" fill="#B91C1C" text-anchor="middle">GATE 2</text>

<!-- ═══════════ RIGHT — THE SHELL ═══════════ -->
<path d="M600,205 L692,205" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#a-violet)"/>

<rect x="700" y="130" width="680" height="190" rx="6" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="1.8"/>
<text x="720" y="160" class="t">LLMInterface.phrase_question("itching")</text>
<text x="720" y="186" class="m">POST /api/chat   model: llama3.2   temperature: 0</text>
<text x="720" y="212" class="b">system: "you are a clinical intake assistant…"</text>
<text x="720" y="240" class="b" font-weight="700">audience hint — the one piece of domain logic it gets:</text>
<text x="720" y="264" class="b">· clinical feature      → phrase it for the <tspan font-weight="700">PATIENT</tspan></text>
<text x="720" y="288" class="b">· histopathology feature → phrase it for the <tspan font-weight="700">CLINICIAN</tspan>, as a biopsy finding</text>
<text x="720" y="310" class="ms" fill="#059669">the audience map is a hard-coded set in reasoning.py — not the LLM's call</text>

<path d="M1040,320 L1040,352" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#a-green)"/>

<rect x="700" y="360" width="680" height="58" rx="16" fill="#FFFFFF" stroke="#10B981" stroke-width="1.6"/>
<text x="1040" y="395" class="b" font-size="14" font-style="italic" text-anchor="middle">"Do you have any itching, and how bad is it?"</text>

<path d="M1380,389 L1432,389" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#a-green)"/>

<!-- human -->
<rect x="1440" y="360" width="320" height="230" rx="6" fill="#64748B" fill-opacity="0.12" stroke="#64748B" stroke-width="1.6"/>
<text x="1600" y="392" class="t2" text-anchor="middle">PATIENT</text>
<text x="1600" y="418" class="ms" text-anchor="middle">answers in plain English</text>
<rect x="1460" y="436" width="280" height="76" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.2"/>
<text x="1600" y="464" class="b" font-style="italic" text-anchor="middle">"yeah it's been really</text>
<text x="1600" y="486" class="b" font-style="italic" text-anchor="middle">bad at night"</text>
<text x="1600" y="504" class="ms" text-anchor="middle" fill="#94A3B8">free text · unstructured</text>
<text x="1600" y="538" class="co" text-anchor="middle">No dropdown. No 0–3 scale.</text>
<text x="1600" y="558" class="co" text-anchor="middle">No clinical vocabulary required.</text>
<text x="1600" y="578" class="ms" text-anchor="middle" fill="#64748B">← this is the ONLY thing the LLM buys us</text>

<path d="M1440,560 L1408,560 L1408,652 L1388,652" fill="none" stroke="#64748B" stroke-width="1.8" marker-end="url(#a-slate)"/>
<g transform="translate(1400,600) rotate(-90)"><text x="0" y="0" class="ms" fill="#475569" text-anchor="middle">raw text</text></g>

<!-- parse -->
<rect x="700" y="600" width="680" height="270" rx="6" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="1.8"/>
<text x="720" y="630" class="t">LLMInterface.parse_answer("itching", raw_text)</text>
<text x="720" y="656" class="m">POST /api/chat   temperature: 0   format: &lt;JSON SCHEMA&gt;</text>

<rect x="720" y="672" width="640" height="94" rx="5" fill="#FFFFFF" stroke="#10B981" stroke-width="1.3"/>
<text x="736" y="694" class="ms" fill="#059669">Ollama's structured-output `format` option CONSTRAINS decoding:</text>
<text x="736" y="718" class="m">{ "value":      0 | 1 | 2 | 3 | null,     ← graded feature</text>
<text x="736" y="740" class="m">  "understood": true | false }            ← "I don't know" is</text>
<text x="736" y="758" class="m">                                             representable</text>

<text x="720" y="792" class="b">binary feature → 0 | 1   ·   age → number   ·   all fields nullable</text>
<text x="720" y="820" class="co" font-weight="700" fill="#059669">This is why we constrain decoding rather than prompt for JSON and hope:</text>
<text x="720" y="840" class="co" font-weight="700" fill="#059669">the decoder is not PERMITTED to emit a malformed value.</text>
<text x="720" y="860" class="ms">"I don't know" → understood=false → feature marked unavailable, skipped, never coerced to 0</text>

<path d="M1040,870 L1040,902" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#a-green)"/>

<rect x="700" y="910" width="680" height="58" rx="16" fill="#FFFFFF" stroke="#10B981" stroke-width="1.6"/>
<text x="720" y="945" class="m">ParsedAnswer(feature="itching", value=3, understood=True, source="llm")</text>

<path d="M1040,968 L1040,1000" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#a-green)"/>

<rect x="700" y="1008" width="680" height="76" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.6"/>
<text x="720" y="1034" class="t2" fill="#B91C1C">_validate(feature, value) — THE DOMAIN GUARD</text>
<text x="720" y="1058" class="b">hard-rejects anything outside {0,1,2,3} / {0,1} / a plausible age.</text>
<text x="720" y="1076" class="ms" fill="#B91C1C">the LLM cannot smuggle a value the engine is not typed to accept</text>

<path d="M700,1046 L672,1046 L672,1110 L608,1110" fill="none" stroke="#EF4444" stroke-width="1.8" marker-end="url(#a-violet)"/>

<!-- ═══════════ GATE CALLOUTS ═══════════ -->
<rect x="1440" y="130" width="320" height="190" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.3" stroke-dasharray="5 3"/>
<text x="1458" y="156" class="cot" fill="#B91C1C">GATE 1 — WHAT GOES OUT</text>
<text x="1458" y="182" class="co" font-weight="700">Payload: one feature name.</text>
<text x="1458" y="202" class="ms">"itching"</text>
<text x="1458" y="228" class="co">A string from a fixed vocabulary of 34.</text>
<text x="1458" y="248" class="co">Nothing else crosses. The model is not</text>
<text x="1458" y="268" class="co">told the posterior, the candidates, or</text>
<text x="1458" y="288" class="co">the answers already given.</text>
<text x="1458" y="310" class="ms" fill="#B91C1C">it cannot leak what it was never given</text>

<rect x="1440" y="640" width="320" height="230" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.3" stroke-dasharray="5 3"/>
<text x="1458" y="666" class="cot" fill="#B91C1C">GATE 2 — WHAT COMES BACK IN</text>
<text x="1458" y="692" class="co" font-weight="700">Payload: one integer.</text>
<text x="1458" y="712" class="ms">3</text>
<text x="1458" y="738" class="co">From a finite, validated domain. The</text>
<text x="1458" y="758" class="co">LLM cannot inject a disease, a</text>
<text x="1458" y="778" class="co">probability, a feature name, or free</text>
<text x="1458" y="798" class="co">text into the reasoning core.</text>
<text x="1458" y="828" class="co" font-weight="700">Two typed gates, both guarded.</text>
<text x="1458" y="848" class="co" font-weight="700">That is the entire attack surface.</text>

<!-- ═══════════ FALLBACK RAIL ═══════════ -->
<rect x="700" y="1110" width="1060" height="150" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="6 4"/>
<text x="720" y="1138" class="t2">OFFLINE FALLBACK — use_llm=False, or the server is down, or the model is missing</text>
<text x="720" y="1162" class="ms">availability probed lazily: GET /api/tags (cached, 3s timeout) · import never requires a server</text>
<text x="720" y="1190" class="b">· phrase → deterministic <tspan font-weight="700">template</tspan>: "On a scale of 0–3, how severe is your itching?"</text>
<text x="720" y="1214" class="b">· parse → <tspan font-weight="700">keyword + regex</tspan>: none|mild|moderate|severe → 0|1|2|3 · yes/no → 1/0 · \d+ → age</text>
<text x="720" y="1242" class="co" font-weight="700" fill="#059669">All 10 llm_interface tests pass with use_llm=False — including a full natural-language loop that reaches the correct diagnosis.</text>

<text x="60" y="1218" class="badge" fill="#334155">localhost:11434 · zero network egress · no API keys</text>
<text x="60" y="1240" class="badge" fill="#334155">llama3.2 (2 GB) · swappable for any local instruct model</text>
<text x="60" y="1262" class="badge" fill="#334155">temperature = 0 on both calls · no data leaves the machine</text>

<!-- ═══════════ THE BANNER ═══════════ -->
<rect x="60" y="1290" width="1700" height="70" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
<text x="910" y="1320" font-size="19" font-weight="700" fill="#B91C1C" text-anchor="middle">THE LLM NEVER DIAGNOSES.</text>
<text x="910" y="1344" class="b" font-size="13" text-anchor="middle">It sees a feature name and an answer string. Delete it and the interface degrades to a dropdown menu — <tspan font-weight="700">not one diagnostic number changes.</tspan></text>

</svg>
